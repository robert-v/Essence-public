type: EssenceLens
name: MAC address vendor
regexPattern: ([0-9a-fA-F]{2}[:-]){5}([0-9a-fA-F]{2})
jsCode: "// Since network requests take time, we return a Promise\nlet requestOptions
  = {\n    method: \"GET\"\n};\n\n// Execute the request using our injected Swift
  function\nlet responseText = fetchSync(`https://api.macvendors.com/` + match, requestOptions);\n\nreturn
  responseText;"
